name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        env:
          NEXT_PUBLIC_VIDEO_HOST: https://cdn.jsdelivr.net/gh/Gowtham-Raj-Dev/free-ai-videos@main/public
        run: npm run build

      - name: Clean up large video files from build output
        run: |
          rm -rf ./out/Ai-Animal-Videos
          rm -rf ./out/Ai-Miniature-Reels
          rm -rf ./out/Ai-Tech-Reels
          rm -rf ./out/Car-Reels
          rm -rf ./out/Funny-Fails-Clips
          rm -rf ./out/Luxury-Reels-Bundle
          rm -rf ./out/Satisfying-Reels
          rm -rf ./out/Study-Reels
          rm -rf ./out/Super-Hero-Videos
          rm -rf ./out/Tools-Tips-Reels
          rm -rf ./out/emotional
          rm -rf ./out/nature

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

